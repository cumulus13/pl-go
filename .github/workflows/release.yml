name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build all platform binaries in parallel
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: pl-linux-amd64
          - goos: linux
            goarch: arm64
            output: pl-linux-arm64
          - goos: linux
            goarch: "386"
            output: pl-linux-386
          - goos: darwin
            goarch: amd64
            output: pl-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: pl-darwin-arm64
          - goos: windows
            goarch: amd64
            output: pl-windows-amd64.exe
          - goos: windows
            goarch: "386"
            output: pl-windows-386.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w \
              -X main.version=${{ github.ref_name }} \
              -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              -X main.commit=${{ github.sha }}" \
            -o dist/${{ matrix.output }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release and attach all binaries
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum * > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          # Extract section between this tag and the previous one in CHANGELOG.md
          # Falls back to a generic message if CHANGELOG.md doesn't exist
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?${TAG//v/}\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          # Write to file to handle multi-line safely
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "pl-go ${{ github.ref_name }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/pl-linux-amd64
            dist/pl-linux-arm64
            dist/pl-linux-386
            dist/pl-darwin-amd64
            dist/pl-darwin-arm64
            dist/pl-windows-amd64.exe
            dist/pl-windows-386.exe
            dist/checksums.txt

  # ────────────────────────────────────────────────────────────────────────────
  # Run tests on every push/PR (not just tags)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build (verify compiles)
        run: go build -o /dev/null .
        if: runner.os != 'Windows'

      - name: Build (verify compiles, Windows)
        run: go build -o nul .
        if: runner.os == 'Windows'

      - name: Run tests
        run: go test ./... -v -timeout 60s
        continue-on-error: true  # no tests yet — prevents failure on empty suite

      - name: Run vet
        run: go vet ./...

  # ────────────────────────────────────────────────────────────────────────────
  # Lint (golangci-lint) on every push/PR
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: >
            --timeout=5m
            --enable=govet,errcheck,staticcheck,unused,gosimple,ineffassign
